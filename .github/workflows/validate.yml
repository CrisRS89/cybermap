name: Validate local

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: |
            apps/web/node_modules
            ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('apps/web/package-lock.json') || hashFiles('apps/web/package.json') }}

      - name: Make validation script executable
        run: chmod +x ./scripts/validate-local.sh

      - name: Run validation
        run: ./scripts/validate-local.sh
